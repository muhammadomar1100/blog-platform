<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Modern Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="signup">
  <main class="auth-wrap">
    <section class="card auth-card">
      <h1>Create Account</h1>
      <p class="muted">Sign up to start posting.</p>
      <form id="signupForm" class="form">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required />
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />
        <button class="btn btn-primary full" type="submit">Sign Up</button>
      </form>
      <p id="authMessage" class="message hidden"></p>
      <p class="center">Already have an account? <a href="login.html">Login</a></p>
      <p class="center"><a href="index.html">Back to feed</a></p>
    </section>
  </main>
  <script src="main.js"></script>
</body>
</html>
